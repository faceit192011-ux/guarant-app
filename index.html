<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гарант Бот</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .demo-badge {
            background: #ffaa00;
            color: #1a1a2e;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="demo-badge">🧪 ДЕМО-РЕЖИМ</div>
        <h3>📝 Создать сделку</h3>
        <input type="number" id="sellerId" placeholder="ID продавца">
        <input type="number" id="amountRub" placeholder="Сумма в RUB">
        <textarea id="description" placeholder="Описание"></textarea>
        <button id="createDealBtn">✅ Создать</button>
    </div>
    <div class="card">
        <h3>📋 Мои сделки</h3>
        <button id="getDealsBtn">📋 Показать</button>
        <div id="dealsList"></div>
    </div>
</div>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function simulatePayment(dealId) {
        tg.showPopup({
            title: "💸 ДЕМО-ОПЛАТА",
            message: "Симуляция: оплата прошла успешно!",
            buttons: [{type: "ok", text: "✅ Оплатить"}]
        }, () => {
            tg.sendData(JSON.stringify({ action: 'confirm_payment', deal_id: dealId }));
            tg.close();
        });
    }

    document.getElementById('createDealBtn').onclick = () => {
        const sellerId = parseInt(document.getElementById('sellerId').value);
        const amountRub = parseFloat(document.getElementById('amountRub').value);
        const description = document.getElementById('description').value;
        if (!sellerId || !amountRub || !description) return alert('Заполните поля');
        tg.sendData(JSON.stringify({ action: 'create_deal', seller_id: sellerId, amount_rub: amountRub, description: description }));
        tg.close();
    };
    document.getElementById('getDealsBtn').onclick = () => {
        tg.sendData(JSON.stringify({ action: 'get_deals' }));
        tg.close();
    };
    const urlParams = new URLSearchParams(window.location.search);
    const dealId = urlParams.get('deal_id');
    if (dealId) simulatePayment(dealId);
</script>
</body>
</html>
